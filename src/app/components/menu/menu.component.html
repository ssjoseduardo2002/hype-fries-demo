<section id="menu" class="menu-section">
  <div class="container">
    <div class="menu-header">
      <span class="menu-subtitle">Elige tu combinación perfecta</span>
      <h2 class="menu-title">Nuestro Menú 🔥</h2>
    </div>

    <!-- El grid ahora es dinámico gracias a Angular -->
    <div class="menu-grid">
      <div class="menu-card" *ngFor="let item of menuItems">
        
        <!-- Badge dinámico (SÓLO aparece si el platillo tiene uno asignado) -->
        <div class="card-badge" *ngIf="item.badge" [ngClass]="item.badgeClass">
          {{ item.badge }}
        </div>
        
        <!-- 📸 El contenedor de la imagen protagónica -->
        <div class="card-image-wrapper">
          <img [src]="item.image" [alt]="item.title" class="card-img" />
        </div>

        <div class="card-content">
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
          <div class="card-footer">
            <span class="price">{{ item.price }}</span>
          </div>
        </div>
        
      </div>
    </div>
  </div>
</section>
