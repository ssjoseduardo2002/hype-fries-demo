<section id="galeria" class="instagram-section">
  <div class="section-header">
    <span class="subtitle">Si el amor nace a primera vista, ven y enamórate de HYPE</span>
    <h2>GALERÍA HYPE</h2>
  </div>

  <div class="gallery-grid">
    @for (post of instagramPosts; track post.id) {
      <!-- Cambiamos <a> por <div> ya que solo es visual -->
      <div class="gallery-item">
        <div class="image-wrapper">
          <img [src]="post.image" alt="Hype Fries Post" class="gallery-img" loading="lazy">
          
          <!-- Overlay que ahora solo funciona como detalle visual/decorativo -->
          <div class="overlay">
            <div class="overlay-content">
              <i class="instagram-icon">📸</i>
              <span class="action-text">DÉJANOS TU LIKE Y UN COMENTARIO BONITO</span>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</section>
